# Railway build for reva-mcp-router.
# Uses the Dockerfile alongside this file.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand: Railway runs it via exec without shell expansion, so
# "$PORT" stays literal and uvicorn rejects it. The Dockerfile's CMD
# already wraps in `sh -c` which expands correctly. Let that drive.
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
